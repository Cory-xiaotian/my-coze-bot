<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的免登录智能助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    #coze-chat {
      width: 100%;
      max-width: 900px;
      height: 85vh;
      max-height: 800px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .error-tip {
      color: #ff4d4f;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="coze-chat"></div>
  <div id="error-tip" class="error-tip" style="display: none;">加载失败，请检查网络或刷新重试</div>

  <script src="https://lf3-static.bytednsdoc.com/obj/eden-cn/nuvjhpqnuvr/chat-app-sdk/1.1.0-beta.0/libs/cn/index.js"></script>

  <script>
    window.addEventListener('load', function() {
      if (typeof CozeWebSDK === 'undefined') {
        document.getElementById('error-tip').style.display = 'block';
        return;
      }

      try {
        const cozeWebSDK = new CozeWebSDK.WebChatClient({
          config: {
            bot_id: '7632550836039630890',
            isIframe: false
          },
          auth: {
            type: 'unauth'
          },
          ui: {
            title: '我的智能助手',
            placement: 'container',
            container: '#coze-chat'
          }
        });
      } catch (e) {
        console.error('初始化失败:', e);
        document.getElementById('error-tip').style.display = 'block';
      }
    });
  </script>
</body>
</html>
